name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # Explicit @rollup/rollup-linux-x64-gnu optionalDependency avoids npm optional-dep
      # install gaps on Linux CI when the lockfile was generated on another OS.
      - run: npm ci
      - run: npm run verify
